name: Deploy to VPS

# Continuous deployment: after the CI workflow succeeds on main, SSH into the
# VPS, pull the latest code and rebuild the stack. Can also be run manually.
on:
  workflow_run:
    workflows: ["Finalytics CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy stack
    runs-on: ubuntu-latest
    # Only deploy when CI passed (or when triggered manually).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 40m
          script: |
            set -euo pipefail
            cd /opt/finalytics
            git fetch --all
            git reset --hard origin/main
            docker compose up -d --build
            docker image prune -f
            echo "Deployed commit: $(git rev-parse --short HEAD)"
