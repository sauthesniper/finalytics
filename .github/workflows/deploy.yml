name: Deploy to VPS

# Continuous deployment: after the CI workflow succeeds on main, SSH into the
# VPS, pull the latest code and rebuild the stack. Can also be run manually.
on:
  workflow_run:
    workflows: ["Finalytics CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy stack
    runs-on: ubuntu-latest
    # Only deploy when CI passed (or when triggered manually).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 40m
          script: |
            set -euo pipefail
            cd /opt/finalytics
            git fetch --all
            git reset --hard origin/main
            docker compose up -d --build
            docker image prune -f
            echo "Deployed commit: $(git rev-parse --short HEAD)"

            # Deterministic health gate: fail the deploy if the stack is not up.
            echo "Waiting for services to become healthy..."
            ok=0
            for i in $(seq 1 30); do
              up=$(docker compose ps --format '{{.Name}} {{.Status}}' | grep -c 'healthy' || true)
              front=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8090/ || echo 000)
              if [ "$front" = "200" ] && [ "$up" -ge 6 ]; then ok=1; break; fi
              sleep 5
            done
            if [ "$ok" != "1" ]; then
              echo "Health gate FAILED after deploy:"; docker compose ps
              exit 1
            fi
            echo "Health gate passed: frontend 200, $up services healthy."
