server {
    listen 80;
    server_name localhost;

    # Docker's embedded DNS. Resolving upstreams at request time (via
    # variables below) means nginx starts even if a backend service is
    # temporarily down — that route returns 502 instead of crashing the UI.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/backend/ {
        set $up_backend backend;
        rewrite ^/api/backend/(.*)$ /$1 break;
        proxy_pass http://$up_backend:8010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    location /api/serp/ {
        set $up_serp serp-api;
        rewrite ^/api/serp/(.*)$ /$1 break;
        proxy_pass http://$up_serp:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/berc/ {
        set $up_berc berc-api;
        rewrite ^/api/berc/(.*)$ /$1 break;
        proxy_pass http://$up_berc:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    location /api/intel/ {
        set $up_intel intel-api;
        rewrite ^/api/intel/(.*)$ /$1 break;
        proxy_pass http://$up_intel:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    location /api/anaf/ {
        set $up_anaf anaf-api;
        rewrite ^/api/anaf/(.*)$ /$1 break;
        proxy_pass http://$up_anaf:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    location /api/ai/ {
        set $up_ai ai-api;
        rewrite ^/api/ai/(.*)$ /$1 break;
        proxy_pass http://$up_ai:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
        # Stream Server-Sent Events without buffering (token-by-token AI output)
        proxy_buffering off;
        proxy_cache off;
    }
}
